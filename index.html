<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐧 Abyss AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 400px;
            max-width: 95%;
        }
        h1 { color: #2d6a9f; margin-bottom: 5px; }
        .sub { color: #888; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary { background: #2d6a9f; color: white; }
        .btn-primary:hover { opacity: 0.8; }
        .btn-secondary { background: #ddd; color: #333; }
        .btn-secondary:hover { background: #ccc; }
        #auth-error { color: red; margin-top: 10px; text-align: center; }
        #main-page { display: none; }
        #user-info {
            background: #f0f2f5;
            padding: 10px 15px;
            border-radius: 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }
        #global-error { color: red; text-align: center; margin-top: 10px; }
        .switch-mode {
            text-align: center;
            margin-top: 15px;
            color: #2d6a9f;
            cursor: pointer;
            font-weight: bold;
        }
        .switch-mode:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div id="app">
    <h1>🐧 Abyss AI</h1>
    <p class="sub" id="form-title">ثبت‌نام</p>

    <!-- صفحه احراز هویت -->
    <div id="auth-page">
        <input type="text" id="username" placeholder="نام کاربری">
        <input type="password" id="password" placeholder="رمز عبور">
        <input type="password" id="confirm-password" placeholder="تکرار رمز عبور">
        <div class="btn-group">
            <button class="btn-primary" id="submitBtn">ثبت‌نام</button>
        </div>
        <div id="auth-error"></div>
        <div class="switch-mode" id="switchMode">قبلاً ثبت‌نام کردی؟ وارد شو</div>
    </div>

    <!-- صفحه اصلی -->
    <div id="main-page">
        <div id="user-info">
            <span>👤 <span id="display-username">کاربر</span></span>
            <span>💰 <span id="display-tokens">0</span> توکن</span>
        </div>
        <p>به اپ خوش اومدی! 🎉</p>
        <button id="logoutBtn" style="background:#e74c3c;color:white;padding:10px;border:none;border-radius:10px;width:100%;margin-top:10px;">خروج</button>
    </div>

    <div id="global-error"></div>
</div>

<script>
// ============================================================
// تنظیمات و اتصال به Supabase
// ============================================================

const SUPABASE_URL = "https://sqiaabmdxhwlqmphcvrv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_UySoruVSw1t6DL5MoHsoKA_LocT4Knz";

let currentUser = null;
let supabase = null;
let isLoginMode = false; // false = ثبت‌نام, true = ورود

// === مقداردهی اولیه Supabase ===
try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('✅ Supabase متصل شد.');
} catch (err) {
    console.error('❌ خطا:', err);
    document.getElementById('global-error').innerText = 'خطا در اتصال به دیتابیس';
}

// === توابع کمکی ===
function showError(msg) {
    document.getElementById('auth-error').innerText = msg;
}

function showGlobalError(msg) {
    const el = document.getElementById('global-error');
    el.innerText = msg;
    setTimeout(() => { el.innerText = ''; }, 5000);
}

// === به‌روزرسانی UI ===
function updateUI() {
    if (!currentUser) return;
    document.getElementById('display-username').innerText = currentUser.username;
    document.getElementById('display-tokens').innerText = currentUser.tokens || 0;
}

// ============================================================
// ثبت‌نام
// ============================================================
async function register() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirmPass = document.getElementById('confirm-password').value.trim();

    // اعتبارسنجی
    if (!username || !password || !confirmPass) {
        return showError('همه فیلدها رو پر کن!');
    }
    if (username.length < 3) {
        return showError('نام کاربری حداقل ۳ کاراکتر!');
    }
    if (password.length < 4) {
        return showError('رمز حداقل ۴ کاراکتر!');
    }
    if (password !== confirmPass) {
        return showError('❌ رمز و تکرار رمز یکسان نیستند!');
    }

    try {
        // چک کردن تکراری نبودن نام کاربری
        const { data: existing } = await supabase
            .from('users')
            .select('username')
            .eq('username', username);

        if (existing && existing.length > 0) {
            return showError('❌ این نام کاربری قبلاً ثبت شده!');
        }

        // ثبت کاربر جدید
        const { data: newUser, error } = await supabase
            .from('users')
            .insert([{
                username,
                password,
                tokens: 100,
                energy: 10,
                fish: 0,
                card_number: Math.random().toString(36).substring(2, 10)
            }])
            .select();

        if (error) {
            console.error(error);
            return showError('خطا: ' + error.message);
        }

        if (newUser && newUser.length > 0) {
            // ثبت‌نام موفق → ورود خودکار
            currentUser = newUser[0];
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
            updateUI();
            showError('');
            localStorage.setItem('abyss-user', JSON.stringify(currentUser));
            alert('✅ ثبت‌نام و ورود موفق!');
        }
    } catch (err) {
        showError('خطا در ارتباط با سرور');
        console.error(err);
    }
}

// ============================================================
// ورود
// ============================================================
async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirmPass = document.getElementById('confirm-password').value.trim();

    if (!username || !password) {
        return showError('نام کاربری و رمز رو وارد کن!');
    }

    // در حالت ورود، فیلد تکرار رمز نباید پر باشه (اختیاری)
    // ولی اگر پر بود نادیده بگیر

    try {
        const { data: users, error } = await supabase
            .from('users')
            .select('*')
            .eq('username', username)
            .eq('password', password);

        if (error) {
            console.error(error);
            return showError('خطا در ارتباط با سرور');
        }

        if (!users || users.length === 0) {
            return showError('❌ نام کاربری یا رمز اشتباهه!');
        }

        currentUser = users[0];
        document.getElementById('auth-page').style.display = 'none';
        document.getElementById('main-page').style.display = 'block';
        updateUI();
        showError('');
        localStorage.setItem('abyss-user', JSON.stringify(currentUser));
    } catch (err) {
        showError('خطا در ارتباط با سرور');
        console.error(err);
    }
}

// ============================================================
// خروج
// ============================================================
function logout() {
    currentUser = null;
    localStorage.removeItem('abyss-user');
    document.getElementById('main-page').style.display = 'none';
    document.getElementById('auth-page').style.display = 'block';
    showGlobalError('👋 تا بعد!');
    // وقتی خارج میشیم، حالت رو به ثبت‌نام برگردونیم
    switchToRegister();
}

// ============================================================
// تغییر حالت بین ثبت‌نام و ورود
// ============================================================
function switchToLogin() {
    isLoginMode = true;
    document.getElementById('form-title').innerText = 'ورود';
    document.getElementById('submitBtn').innerText = 'ورود';
    document.getElementById('switchMode').innerText = 'ثبت‌نام نکردی؟ ثبت‌نام کن';
    document.getElementById('confirm-password').style.display = 'none';
    showError('');
}

function switchToRegister() {
    isLoginMode = false;
    document.getElementById('form-title').innerText = 'ثبت‌نام';
    document.getElementById('submitBtn').innerText = 'ثبت‌نام';
    document.getElementById('switchMode').innerText = 'قبلاً ثبت‌نام کردی؟ وارد شو';
    document.getElementById('confirm-password').style.display = 'block';
    showError('');
}

// ============================================================
// اتصال دکمه‌ها
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
    // دکمه اصلی (ثبت‌نام یا ورود)
    const submitBtn = document.getElementById('submitBtn');
    if (submitBtn) {
        submitBtn.addEventListener('click', function() {
            if (isLoginMode) {
                login();
            } else {
                register();
            }
        });
    }

    // دکمه تغییر حالت
    const switchMode = document.getElementById('switchMode');
    if (switchMode) {
        switchMode.addEventListener('click', function() {
            if (isLoginMode) {
                switchToRegister();
            } else {
                switchToLogin();
            }
        });
    }

    // دکمه خروج
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', logout);
    }

    // بررسی جلسه ذخیره شده
    checkSavedSession();

    // پیش‌فرض: حالت ثبت‌نام
    switchToRegister();

    console.log('✅ همه دکمه‌ها متصل شدند.');
});

// ============================================================
// بررسی جلسه ذخیره شده
// ============================================================
async function checkSavedSession() {
    const saved = localStorage.getItem('abyss-user');
    if (!saved || !supabase) return false;

    try {
        const user = JSON.parse(saved);
        const { data: users, error } = await supabase
            .from('users')
            .select('*')
            .eq('id', user.id);

        if (!error && users && users.length > 0) {
            currentUser = users[0];
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
            updateUI();
            return true;
        }
    } catch (e) {
        console.log('جلسه قبلی منقضی شده');
    }
    return false;
}
</script>

</body>
</html>
