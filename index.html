<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐧 Abyss AI</title>
    
    <style>
        /* ===== متغیرهای اصلی ===== */
        :root {
            --bg: #f5f7fa;
            --bg2: #ffffff;
            --text: #1a1a2e;
            --text2: #4a4a6a;
            --border: #e0e0e0;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --primary: #2d6a9f;
            --primary-light: #4a8bc2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --radius: 16px;
            --transition: 0.3s ease;
        }
        
        .dark {
            --bg: #0f0f1a;
            --bg2: #1a1a2e;
            --text: #e8e8f0;
            --text2: #a0a0b8;
            --border: #2a2a44;
            --shadow: 0 4px 15px rgba(0,0,0,0.4);
            --primary: #4a8bc2;
            --primary-light: #6aa8d4;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px;
            margin: 0;
        }
        
        #app {
            max-width: 480px;
            width: 100%;
            background: var(--bg2);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            transition: background 0.3s, box-shadow 0.3s;
            position: relative;
            min-height: 90vh;
        }
        
        #theme-toggle {
            position: absolute;
            top: 12px;
            right: 16px;
            background: var(--bg);
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            z-index: 10;
            color: var(--text);
        }
        
        #auth-page { padding-top: 40px; }
        #auth-page h1 { font-size: 28px; text-align: center; color: var(--primary); }
        #auth-page .sub { text-align: center; color: var(--text2); margin-bottom: 30px; font-size: 14px; }
        
        .auth-box {
            background: var(--bg);
            padding: 24px;
            border-radius: var(--radius);
        }
        
        .auth-box input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg2);
            color: var(--text);
            font-size: 15px;
            direction: ltr;
        }
        
        .auth-box input:focus { outline: none; border-color: var(--primary); }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.85; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { opacity: 0.7; }
        
        #auth-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 8px; min-height: 20px; }
        
        #main-page { display: none; padding-top: 8px; }
        
        #user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
            padding: 10px 16px;
            border-radius: 30px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        #user-info .badge {
            background: var(--primary);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        #menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0 24px;
        }
        
        #menu button {
            padding: 18px 8px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg2);
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        
        #menu button:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--primary); }
        #menu button .icon { font-size: 28px; display: block; margin-bottom: 4px; }
        
        .section { display: none; margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--border); }
        .section.active { display: block; }
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        
        #chat-box {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 12px;
            height: 260px;
            overflow-y: auto;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.7;
        }
        
        #chat-box .user-msg { color: var(--primary); font-weight: 600; }
        #chat-box .bot-msg { color: var(--text2); }
        
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 30px;
            background: var(--bg2);
            color: var(--text);
            font-size: 14px;
        }
        .chat-input-row input:focus { outline: none; border-color: var(--primary); }
        .chat-input-row button {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        #gameCanvas {
            width: 100%;
            border-radius: var(--radius);
            background: #87CEEB;
            display: block;
            margin-bottom: 12px;
            cursor: pointer;
            touch-action: none;
        }
        
        .game-stats {
            display: flex;
            justify-content: space-around;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            background: var(--bg);
            padding: 10px;
            border-radius: var(--radius);
            margin-bottom: 10px;
        }
        
        .game-stats span { color: var(--primary); }
        
        .charity-links { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
        .charity-links a {
            color: var(--primary);
            text-decoration: none;
            padding: 8px 12px;
            background: var(--bg);
            border-radius: 8px;
            transition: 0.3s;
            font-size: 14px;
        }
        .charity-links a:hover { background: var(--primary); color: white; }
        
        .donate-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .donate-row input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 30px;
            background: var(--bg2);
            color: var(--text);
            font-size: 14px;
            min-width: 100px;
        }
        .donate-row button {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: var(--success);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        .bank-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin: 12px 0;
        }
        .bank-buttons button {
            padding: 12px 4px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg2);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .bank-buttons button:hover { border-color: var(--primary); transform: translateY(-2px); }
        
        #bank-info {
            background: var(--bg);
            padding: 12px;
            border-radius: var(--radius);
            font-size: 14px;
            margin-top: 12px;
            min-height: 40px;
        }
        
        .transfer-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .transfer-row input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 30px;
            background: var(--bg2);
            color: var(--text);
            font-size: 14px;
            min-width: 100px;
        }
        .transfer-row button {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: var(--primary-light);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        #global-error {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }
        
        @media (max-width: 400px) {
            #app { padding: 14px; }
            #menu { grid-template-columns: 1fr 1fr; gap: 8px; }
            #menu button { padding: 14px 4px; font-size: 13px; }
            .bank-buttons { grid-template-columns: 1fr; }
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
    </style>
</head>
<body>

<div id="app">
    <button id="theme-toggle" onclick="toggleTheme()">🌓</button>
    
    <div id="auth-page">
        <h1>🐧 Abyss AI</h1>
        <p class="sub">تنهایی رو با هم تقسیم می‌کنیم</p>
        <div class="auth-box">
            <input type="text" id="username" placeholder="نام کاربری">
            <input type="password" id="password" placeholder="رمز عبور">
            <div class="btn-group">
                <button class="btn-primary" onclick="register()">ثبت‌نام</button>
                <button class="btn-secondary" onclick="login()">ورود</button>
            </div>
            <div id="auth-error"></div>
        </div>
    </div>
    
    <div id="main-page" style="display:none;">
        <div id="user-info">
            <span>👤 <span id="display-username">کاربر</span></span>
            <span>💰 <span id="display-tokens">0</span> توکن</span>
            <span class="badge">⚡ <span id="display-energy">10</span></span>
        </div>
        
        <div id="menu">
            <button onclick="showSection('chat')"><span class="icon">💬</span>هوش مصنوعی</button>
            <button onclick="showSection('mine')"><span class="icon">⛏</span>ماین</button>
            <button onclick="showSection('charity')"><span class="icon">❤️</span>خیریه</button>
            <button onclick="showSection('bank')"><span class="icon">🏦</span>بانک</button>
        </div>
        
        <div id="chat-section" class="section">
            <div class="section-title">💬 گفتگو با پنگوئن</div>
            <div id="chat-box"></div>
            <div class="chat-input-row">
                <input type="text" id="chat-input" placeholder="چیزی بگو..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">ارسال</button>
            </div>
        </div>
        
        <div id="mine-section" class="section">
            <div class="section-title">⛏ ماین ماهی</div>
            <canvas id="gameCanvas" width="400" height="320"></canvas>
            <div class="game-stats">
                <div>🐟 ماهی‌ها: <span id="fish-count">0</span></div>
                <div>⚡ انرژی: <span id="energy-count">10</span></div>
                <div>🎣 <span id="game-status">آماده</span></div>
            </div>
            <button class="btn-primary" style="width:100%;padding:12px;border:none;border-radius:30px;font-weight:600;cursor:pointer;" onclick="startFishing()">🎣 شروع ماهی‌گیری</button>
        </div>
        
        <div id="charity-section" class="section">
            <div class="section-title">❤️ خیریه پنگوئن‌ها</div>
            <div class="charity-links">
                <a href="https://www.penguinsg.org/" target="_blank">🌍 Penguins Global</a>
                <a href="https://www.penguinsinternational.org/" target="_blank">🌍 Penguins International</a>
                <a href="https://www.globalpenguinsociety.org/" target="_blank">🌍 Global Penguin Society</a>
            </div>
            <div class="donate-row">
                <input type="number" id="donate-amount" placeholder="تعداد توکن" min="1">
                <button onclick="donateTokens()">اهدای توکن</button>
            </div>
            <div style="font-size:13px;color:var(--text2);margin-top:8px;">💰 هر ۱۰,۰۰۰ توکن = ۱ دلار کمک به خیریه</div>
        </div>
        
        <div id="bank-section" class="section">
            <div class="section-title">🏦 بانک</div>
            <div class="bank-buttons">
                <button onclick="deposit('week')">🗓 ۱ هفته<br><small>۲% سود</small></button>
                <button onclick="deposit('month')">🗓 ۴۰ روز<br><small>۵% سود</small></button>
                <button onclick="deposit('year')">🗓 ۱ سال<br><small>۲۰% سود</small></button>
            </div>
            <div id="bank-info">💰 سپرده‌ات رو انتخاب کن.</div>
            
            <div style="margin-top:16px;border-top:2px solid var(--border);padding-top:16px;">
                <div class="section-title" style="font-size:16px;">💳 انتقال توکن</div>
                <div class="transfer-row">
                    <input type="text" id="transfer-card" placeholder="شماره کارت مقصد" maxlength="16">
                    <input type="number" id="transfer-amount" placeholder="مقدار" min="1">
                    <button onclick="transferTokens()">ارسال</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="global-error"></div>
</div>

<!-- ============================================================ -->
<!-- ====== بخش دوم: جاوااسکریپت کامل و سالم ====== -->
<!-- ============================================================ -->
<script>
// ============================================================
// بخش دوم - قسمت ۱: تنظیمات و احراز هویت
// ============================================================

// === تنظیمات کامل ===
const BOT_TOKEN = "8705538996:AAH_8wukB7mR3eoQb_XFZu7IASDDscFLkG4";
const MISTRAL_API_KEY = "BOVuOxjc7VUwRKzcHAn55Jm7FgN38aBs";
const MISTRAL_URL = "https://api.mistral.ai/v1/chat/completions";
const MISTRAL_MODEL = "mistral-small-latest";

const SUPABASE_URL = "https://sqiaabmdxhwlqmphcvrv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_UySoruVSw1t6DL5MoHsoKA_LocT4Knz";

const TOKEN_NAME = "$Abyss";
const TOKEN_SYMBOL = "ABYSS";

let currentUser = null;
let supabase = null;

// === بارگذاری Supabase ===
async function loadSupabase() {
    try {
        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
        supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('✅ Supabase متصل شد.');
        await checkSavedSession();
    } catch (err) {
        console.error('❌ خطا:', err);
        document.getElementById('global-error').innerText = 'خطا در اتصال به دیتابیس';
    }
}

// === توابع کمکی ===
function showError(msg) {
    document.getElementById('auth-error').innerText = msg;
}

function showGlobalError(msg) {
    const el = document.getElementById('global-error');
    el.innerText = msg;
    setTimeout(() => { el.innerText = ''; }, 5000);
}

function generateCardNumber() {
    let card = '';
    for (let i = 0; i < 16; i++) {
        card += Math.floor(Math.random() * 10);
    }
    return card;
}

// === تغییر تم ===
window.toggleTheme = function() {
    document.body.classList.toggle('dark');
    localStorage.setItem('abyss-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
};

// بارگذاری تم
if (localStorage.getItem('abyss-theme') === 'dark') {
    document.body.classList.add('dark');
}

// === مدیریت بخش‌ها ===
window.showSection = function(section) {
    document.querySelectorAll('.section').forEach(el => {
        el.style.display = 'none';
    });
    const target = document.getElementById(section + '-section');
    if (target) {
        target.style.display = 'block';
    }
};

// === به‌روزرسانی UI ===
function updateUI() {
    if (!currentUser) return;
    document.getElementById('display-username').innerText = currentUser.username;
    document.getElementById('display-tokens').innerText = currentUser.tokens || 0;
    document.getElementById('display-energy').innerText = currentUser.energy || 10;
    document.getElementById('energy-count').innerText = currentUser.energy || 10;
    document.getElementById('fish-count').innerText = currentUser.fish || 0;
}

// === ذخیره توکن ===
async function updateUserTokens() {
    if (!currentUser || !supabase) return;
    try {
        await supabase
            .from('users')
            .update({ 
                tokens: currentUser.tokens,
                energy: currentUser.energy,
                fish: currentUser.fish || 0
            })
            .eq('id', currentUser.id);
    } catch (e) {
        console.error('خطا:', e);
    }
}

// === ثبت‌نام ===
window.register = async function() {
    if (!supabase) return showError('دیتابیس در دسترس نیست!');
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    
    if (!username || !password) return showError('همه فیلدها رو پر کن!');
    if (username.length < 3) return showError('نام کاربری حداقل ۳ کاراکتر!');
    if (password.length < 4) return showError('رمز حداقل ۴ کاراکتر!');
    
    try {
        const { data: existing } = await supabase
            .from('users')
            .select('username')
            .eq('username', username);
        
        if (existing && existing.length > 0) {
            return showError('❌ این نام کاربری قبلاً ثبت شده!');
        }
        
        const { data: newUser, error } = await supabase
            .from('users')
            .insert([{ 
                username, 
                password, 
                tokens: 100, 
                energy: 10, 
                fish: 0,
                card_number: generateCardNumber()
            }])
            .select();
        
        if (error) return showError('خطا: ' + error.message);
        
        if (newUser && newUser.length > 0) {
            alert('✅ ثبت‌نام موفق! حالا وارد شو.');
            currentUser = newUser[0];
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
            updateUI();
            showError('');
            localStorage.setItem('abyss-user', JSON.stringify(currentUser));
        }
    } catch (err) {
        showError('خطا در ارتباط با سرور');
    }
};

// === ورود ===
window.login = async function() {
    if (!supabase) return showError('دیتابیس در دسترس نیست!');
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    
    if (!username || !password) return showError('نام کاربری و رمز رو وارد کن!');
    
    try {
        const { data: users, error } = await supabase
            .from('users')
            .select('*')
            .eq('username', username)
            .eq('password', password);
        
        if (error) return showError('خطا در ارتباط با سرور');
        if (!users || users.length === 0) return showError('❌ نام کاربری یا رمز اشتباهه!');
        
        currentUser = users[0];
        document.getElementById('auth-page').style.display = 'none';
        document.getElementById('main-page').style.display = 'block';
        updateUI();
        showError('');
        localStorage.setItem('abyss-user', JSON.stringify(currentUser));
    } catch (err) {
        showError('خطا در ارتباط با سرور');
    }
};

// === بررسی جلسه ===
async function checkSavedSession() {
    const saved = localStorage.getItem('abyss-user');
    if (!saved || !supabase) return false;
    
    try {
        const user = JSON.parse(saved);
        const { data: users, error } = await supabase
            .from('users')
            .select('*')
            .eq('id', user.id);
        
        if (!error && users && users.length > 0) {
            currentUser = users[0];
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
            updateUI();
            return true;
        }
    } catch (e) {}
    return false;
}

// ============================================================
// بخش دوم - قسمت ۲: هوش مصنوعی و ماین
// ============================================================

// === هوش مصنوعی ===
window.sendMessage = async function() {
    if (!currentUser) {
        return showGlobalError('لطفاً اول وارد شو!');
    }
    
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;
    
    if (currentUser.tokens < 100) {
        return showGlobalError('❌ توکن کافی نیست! هر پیام ۱۰۰ توکن نیاز داره.');
    }
    
    currentUser.tokens -= 100;
    await updateUserTokens();
    updateUI();
    
    const chatBox = document.getElementById('chat-box');
    chatBox.innerHTML += `<div class="user-msg">👤 شما: ${message}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
    
    input.value = '';
    input.disabled = true;
    
    try {
        const response = await fetch(MISTRAL_URL, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${MISTRAL_API_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: MISTRAL_MODEL,
                messages: [
                    { role: "system", content: "تو یک پنگوئن مهربون و تنها هستی که با کاربر حرف میزنی." },
                    { role: "user", content: message }
                ],
                temperature: 0.8,
                max_tokens: 500
            })
        });
        
        const data = await response.json();
        
        if (data.choices && data.choices.length > 0) {
            chatBox.innerHTML += `<div class="bot-msg">🐧 ابیس: ${data.choices[0].message.content}</div>`;
        } else {
            chatBox.innerHTML += `<div class="bot-msg">🐧 ابیس: متاسفم، نتونستم جوابتو بدم.</div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    } catch (error) {
        console.error('خطا:', error);
        chatBox.innerHTML += `<div class="bot-msg">🐧 ابیس: خطا در ارتباط با سرور!</div>`;
        currentUser.tokens += 100;
        await updateUserTokens();
        updateUI();
    }
    
    input.disabled = false;
    input.focus();
};

// === بازی ماین ===
let isFishing = false;
let fishingTimeout = null;

function initGame() {
    if (currentUser) {
        document.getElementById('fish-count').innerText = currentUser.fish || 0;
        document.getElementById('energy-count').innerText = currentUser.energy || 10;
    }
}

window.startFishing = function() {
    if (isFishing) return showGlobalError('⏳ صبر کن!');
    if (!currentUser) return showGlobalError('لطفاً اول وارد شو!');
    if (currentUser.energy <= 0) return showGlobalError('⚡ انرژی تموم شد!');
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('game-status');
    
    currentUser.energy -= 1;
    updateUserTokens();
    document.getElementById('energy-count').innerText = currentUser.energy;
    
    isFishing = true;
    status.innerText = '🎣 در حال ماهی‌گیری...';
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#42a5f5';
    ctx.fillRect(0, 200, canvas.width, 120);
    
    ctx.fillStyle = '#1a237e';
    ctx.fillRect(30, 160, 30, 40);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(35, 150, 20, 15);
    ctx.fillStyle = '#ff9800';
    ctx.fillRect(50, 165, 8, 5);
    
    ctx.strokeStyle = '#8d6e63';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(45, 185);
    ctx.lineTo(120, 220);
    ctx.stroke();
    
    ctx.strokeStyle = '#bdbdbd';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(120, 220);
    ctx.lineTo(150, 270);
    ctx.stroke();
    
    const waitTime = Math.floor(Math.random() * 30000) + 3000;
    status.innerText = `🎣 منتظر ماهی... (${Math.round(waitTime/1000)} ثانیه)`;
    
    fishingTimeout = setTimeout(() => {
        ctx.font = '50px Arial';
        ctx.fillStyle = '#ff0000';
        ctx.fillText('❗', 200, 250);
        status.innerText = '❗ ماهی اومد! سریع بزن!';
        
        let clicked = false;
        const clickHandler = function() {
            if (clicked) return;
            clicked = true;
            
            currentUser.fish = (currentUser.fish || 0) + 1;
            updateUserTokens();
            document.getElementById('fish-count').innerText = currentUser.fish;
            
            ctx.fillStyle = '#ff6f00';
            ctx.beginPath();
            ctx.arc(220, 250, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = '20px Arial';
            ctx.fillText('🐟', 210, 260);
            
            status.innerText = '🎣 ماهی گرفتی! +۱';
            showGlobalError('🐟 ماهی گرفتی!');
            canvas.removeEventListener('click', clickHandler);
            isFishing = false;
            clearTimeout(fishingTimeout);
        };
        
        canvas.addEventListener('click', clickHandler);
        
        setTimeout(() => {
            if (!clicked) {
                status.innerText = '💨 ماهی فرار کرد!';
                showGlobalError('💨 ماهی فرار کرد!');
                isFishing = false;
                canvas.removeEventListener('click', clickHandler);
            }
        }, 3000);
        
    }, waitTime);
};

// ============================================================
// بخش دوم - قسمت ۳: خیریه و بانک
// ============================================================

// === خیریه ===
window.donateTokens = async function() {
    if (!currentUser) return showGlobalError('لطفاً اول وارد شو!');
    
    const amount = parseInt(document.getElementById('donate-amount').value);
    if (!amount || amount <= 0) return showGlobalError('❌ تعداد توکن معتبر وارد کن!');
    if (currentUser.tokens < amount) return showGlobalError('❌ توکن کافی نیست!');
    
    const dollars = (amount / 10000).toFixed(2);
    if (!confirm(`❤️ آیا ${amount} توکن (${dollars} دلار) به خیریه اهدا میشه؟`)) return;
    
    currentUser.tokens -= amount;
    await updateUserTokens();
    updateUI();
    document.getElementById('donate-amount').value = '';
    
    try {
        await supabase.from('donations').insert([{ 
            user_id: currentUser.id, 
            amount: amount,
            dollars: dollars
        }]);
    } catch (e) {}
    
    showGlobalError(`✅ ${amount} توکن با موفقیت اهدا شد! (${dollars} دلار)`);
};

// === بانک ===
window.deposit = async function(duration) {
    if (!currentUser) return showGlobalError('لطفاً اول وارد شو!');
    
    const amount = parseInt(prompt('چند توکن میخوای سپرده بذاری؟'));
    if (!amount || amount <= 0) return;
    if (currentUser.tokens < amount) return showGlobalError('❌ توکن کافی نیست!');
    
    let rate = 0, days = 0, label = '';
    if (duration === 'week') { rate = 2; days = 7; label = '۱ هفته'; }
    else if (duration === 'month') { rate = 5; days = 40; label = '۴۰ روز'; }
    else if (duration === 'year') { rate = 20; days = 365; label = '۱ سال'; }
    
    if (!confirm(`🏦 سپرده ${amount} توکن با سود ${rate}% به مدت ${label}؟`)) return;
    
    currentUser.tokens -= amount;
    await updateUserTokens();
    updateUI();
    
    try {
        await supabase.from('deposits').insert([{
            user_id: currentUser.id,
            amount: amount,
            duration: days,
            interest_rate: rate,
            start_date: new Date().toISOString()
        }]);
        
        document.getElementById('bank-info').innerHTML = 
            `✅ سپرده ${amount} توکن ثبت شد!<br>📅 مدت: ${label} | سود: ${rate}%`;
        showGlobalError(`✅ سپرده ${amount} توکن ثبت شد!`);
    } catch (e) {
        currentUser.tokens += amount;
        await updateUserTokens();
        updateUI();
        showGlobalError('❌ خطا در ثبت سپرده!');
    }
};

// === انتقال توکن ===
window.transferTokens = async function() {
    if (!currentUser) return showGlobalError('لطفاً اول وارد شو!');
    
    const card = document.getElementById('transfer-card').value.trim();
    const amount = parseInt(document.getElementById('transfer-amount').value);
    
    if (!card || card.length !== 16) return showGlobalError('❌ شماره کارت ۱۶ رقمه!');
    if (!amount || amount <= 0) return showGlobalError('❌ مقدار معتبر وارد کن!');
    if (currentUser.tokens < amount) return showGlobalError('❌ توکن کافی نیست!');
    
    try {
        const { data: receiver } = await supabase
            .from('users')
            .select('*')
            .eq('card_number', card);
        
        if (!receiver || receiver.length === 0) return showGlobalError('❌ شماره کارت اشتباهه!');
        if (receiver[0].id === currentUser.id) return showGlobalError('❌ نمیتونی به خودت انتقال بدی!');
        
        currentUser.tokens -= amount;
        receiver[0].tokens += amount;
        
        await supabase.from('users').update({ tokens: currentUser.tokens }).eq('id', currentUser.id);
        await supabase.from('users').update({ tokens: receiver[0].tokens }).eq('id', receiver[0].id);
        
        await supabase.from('transactions').insert([{
            from_user_id: currentUser.id,
            to_user_id: receiver[0].id,
            amount: amount
        }]);
        
        updateUI();
        document.getElementById('transfer-card').value = '';
        document.getElementById('transfer-amount').value = '';
        showGlobalError(`✅ ${amount} توکن به ${receiver[0].username} فرستاده شد!`);
    } catch (err) {
        showGlobalError('❌ خطا در انتقال!');
    }
};
